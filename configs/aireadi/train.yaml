### Dataset ###
data:
  name: ai_readi
  data_path: /playpen-shared/haochenz/AI-READI
  window_size: 1024
  predict_size: 512
  retinal_resize: [256, 337]


### Pretrain ###
train:
  epochs: 700
  batch_size: 256
  lr: 5.0e-4
  itr_per_epoch: 1.0e+8
  model_path: ""
  output_folder: pretrain
  val_epoch_interval: 10
  display_interval: 1
